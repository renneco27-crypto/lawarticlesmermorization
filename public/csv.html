<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lex Memoria — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #58cc02; --green-dark: #4aaa02; --green-bg: #d7ffb8;
  --blue: #1cb0f6; --blue-bg: #ddf4ff;
  --red: #ff4b4b; --red-bg: #ffdfe0;
  --orange: #ff9600; --orange-bg: #feefe3;
  --purple: #ce82ff; --purple-bg: #f0d9ff;
  --gold: #ffc800;
  --bg: #131f24; --surface: #1c2d35; --surface2: #243540;
  --surface3: #2e4250; --border: #2e4250;
  --text: #e8f4f0; --text-dim: #8ba7b2; --text-muted: #526b78;
  --radius-sm: 8px; --radius: 12px; --radius-lg: 18px; --radius-xl: 24px;
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px;
}
.login-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.login-overlay.hidden { display: none; }
.login-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 36px 32px;
  width: 90%; max-width: 380px;
  text-align: center;
}
.login-logo {
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 28px; color: var(--green); margin-bottom: 4px;
}
.login-logo span { color: var(--text); }
.login-sub {
  font-size: 13px; color: var(--text-muted); margin-bottom: 24px;
}
.login-field {
  width: 100%;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  font-family: 'Inter', sans-serif; font-size: 14px;
  color: var(--text); outline: none; margin-bottom: 12px;
  transition: border-color 0.12s;
}
.login-field:focus { border-color: var(--green); }
.login-field::placeholder { color: var(--text-muted); }
.login-btn {
  width: 100%;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
  padding: 10px; border-radius: 99px; border: none;
  background: var(--green); color: #fff; cursor: pointer;
  transition: background 0.12s; margin-top: 4px;
}
.login-btn:hover { background: var(--green-dark); }
.login-btn:disabled { opacity: 0.4; cursor: default; }
.login-error {
  font-size: 12px; color: var(--red); margin-top: 10px; min-height: 18px;
}
.topbar {
  width: 100%; max-width: 680px;
  display: flex; align-items: center; gap: 12px;
  padding: 0 0 14px;
}
.logo {
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 22px; color: var(--green); flex-shrink: 0;
}
.logo span { color: var(--text); }
.upload-btn-top {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px;
  padding: 6px 13px; border-radius: 99px;
  border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.upload-btn-top:hover { border-color: var(--blue); color: var(--blue); background: rgba(28,176,246,0.1); }
.btn-sm {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 11px;
  padding: 4px 10px; border-radius: 99px;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all 0.12s;
}
.btn-sm:hover { border-color: var(--blue); color: var(--blue); }
.btn-primary {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
  padding: 7px 18px; border-radius: 99px; border: none;
  background: var(--green); color: #fff; cursor: pointer; transition: all 0.12s;
}
.btn-primary:hover { background: var(--green-dark); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-cancel {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
  padding: 7px 16px; border-radius: 99px;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all 0.12s;
}
.btn-cancel:hover { color: var(--text); }
.btn-danger {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 11px;
  padding: 4px 10px; border-radius: 99px;
  border: 1.5px solid var(--red); background: transparent;
  color: var(--red); cursor: pointer; transition: all 0.12s;
}
.btn-danger:hover { background: rgba(255,75,75,0.1); }
.upload-modal {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius-xl); width: 90%; max-width: 680px;
  max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
}
.upload-head {
  padding: 18px 22px 14px;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px;
  border-bottom: 1.5px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.upload-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 22px; cursor: pointer; padding: 0 4px;
}
.upload-close:hover { color: var(--text); }
.upload-tabs {
  display: flex; border-bottom: 1.5px solid var(--border); background: var(--bg);
}
.upload-tab {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px;
  padding: 10px 16px; border: none; background: transparent;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2.5px solid transparent; transition: all 0.12s;
  display: flex; align-items: center; gap: 5px;
}
.upload-tab:hover { color: var(--text); }
.upload-tab.active { color: var(--green); border-bottom-color: var(--green); }
.upload-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
.upload-pane { display: block; }
.upload-pane.hidden { display: none; }
.drop-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 36px 20px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--green); background: rgba(88,204,2,0.04); }
.drop-zone-icon { font-size: 36px; color: var(--text-muted); margin-bottom: 8px; }
.drop-zone-text { font-size: 14px; color: var(--text-dim); font-weight: 600; }
.drop-zone-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.upload-preview { margin-top: 16px; }
.upload-preview table { width: 100%; border-collapse: collapse; font-size: 12px; }
.upload-preview th { text-align: left; color: var(--text-muted); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 8px; border-bottom: 1.5px solid var(--border); }
.upload-preview td { padding: 6px 8px; border-bottom: 1px solid var(--surface3); color: var(--text-dim); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.upload-preview td.num { font-family: 'JetBrains Mono', monospace; color: var(--gold); width: 30px; }
.upload-preview tr:hover td { background: var(--surface2); }
.upload-footer { padding: 14px 22px; border-top: 1.5px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; align-items: center; }
.upload-result { margin-top: 12px; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 600; }
.upload-result.ok { background: rgba(88,204,2,0.1); color: var(--green); }
.upload-result.err { background: rgba(255,75,75,0.1); color: var(--red); }
.article-form { display: flex; flex-direction: column; gap: 12px; }
.field-row { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
.field-input, .field-textarea { background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.12s; }
.field-input:focus, .field-textarea:focus { border-color: var(--green); }
.field-textarea { min-height: 120px; resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; width: 100%; }
.field-row-inline { display: flex; gap: 10px; }
.field-row-inline .field-row { flex: 1; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.mgr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.mgr-count { font-size: 12px; color: var(--text-muted); }
.mgr-list { display: flex; flex-direction: column; gap: 6px; }
.mgr-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface2); border-radius: var(--radius-sm); border: 1.5px solid var(--border); transition: border-color 0.12s; }
.mgr-item:hover { border-color: var(--surface3); }
.mgr-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--gold); min-width: 24px; }
.mgr-info { flex: 1; min-width: 0; }
.mgr-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mgr-sub { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mgr-actions { display: flex; gap: 4px; flex-shrink: 0; }
.mgr-empty { text-align: center; padding: 32px 0; color: var(--text-muted); font-size: 13px; }
.upload-book-row { display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap; }
.upload-book-select { font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface3);color:var(--text);min-width:160px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="login-overlay" id="supaOverlay">
  <div class="login-card">
    <div class="login-logo">Lex <span>Memoria</span></div>
    <div class="login-sub">Sign in to your account</div>
    <input class="login-field" id="loginEmail" type="email" placeholder="Email" autocomplete="email">
    <input class="login-field" id="loginPass" type="password" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="supaLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="login-overlay hidden" id="adminOverlay">
  <div class="login-card">
    <div class="login-logo">Lex <span>Memoria</span></div>
    <div class="login-sub">Admin — Article Manager</div>
    <input class="login-field" id="adminPass" type="password" placeholder="Admin password" autocomplete="off" oninput="saveAdminPass()">
    <button class="login-btn" id="adminLoginBtn" onclick="adminLogin()">Sign In</button>
    <div class="login-error" id="adminLoginError"></div>
  </div>
</div>

<div class="topbar" id="topbar" style="display:none">
  <div class="logo">Lex <span>Memoria</span></div>
  <div style="flex:1"></div>
  <button class="upload-btn-top" onclick="document.getElementById('uploadModal').classList.toggle('hidden')">
    <i class="ti ti-file-upload"></i> Open Manager
  </button>
  <button class="upload-btn-top" onclick="window.location.href='https://lawrence.cloud-ip.cc/'">
    <i class="ti ti-external-link"></i> lawrence.cloud-ip.cc
  </button>
</div>

<div id="uploadModal" class="hidden" style="width:100%;max-width:680px">
<div class="upload-modal">
  <div class="upload-head">
    <span>📄 Article Manager</span>
  </div>
  <div class="upload-tabs">
    <button class="upload-tab active" onclick="switchUploadTab('csv', this)">📄 CSV</button>
    <button class="upload-tab" onclick="switchUploadTab('add', this)">➕ Add</button>
    <button class="upload-tab" onclick="switchUploadTab('manage', this)">📋 Manage</button>
    <button class="upload-tab" onclick="switchUploadTab('generate', this)">🛠️ Generate</button>
  </div>
  <div class="upload-body">
    <div id="uploadPaneCsv" class="upload-pane">
      <div class="upload-book-row">
        <label class="field-label" style="margin-bottom:0;">Upload to book:</label>
        <select class="upload-book-select" id="uploadBookSelect" onchange="currentBookId=this.value;renderBookSelect()"></select>
        <div class="upload-book-actions" id="uploadBookActions"></div>
        <button class="btn-sm" onclick="createBookFromUpload()" title="Create new book">+ New</button>
      </div>
      <input type="file" id="csvFileInput" accept=".csv,.txt" style="display:none" onchange="handleFile(this)">
      <div class="drop-zone" id="dropZone"
        onclick="document.getElementById('csvFileInput').click()"
        ondragover="handleDragOver(event)"
        ondragleave="handleDragLeave(event)"
        ondrop="handleDrop(event)">
        <div class="drop-zone-icon"><i class="ti ti-file-spreadsheet"></i></div>
        <div class="drop-zone-text">Drop a .csv or .txt file here, or click to browse</div>
        <div class="drop-zone-sub">Expected columns: chapter, article_number, title, content_md</div>
      </div>
      <div class="upload-preview" id="uploadPreview" style="display:none">
        <table><thead><tr><th>#</th><th>Art.</th><th>Title</th><th>Chapter</th></tr></thead>
        <tbody id="previewBody"></tbody></table>
      </div>
      <div id="uploadCsvResult" class="upload-result" style="display:none"></div>
      <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-primary" id="confirmUploadBtn" onclick="confirmUpload()" disabled>Upload CSV</button>
      </div>
    </div>
    <div id="uploadPaneAdd" class="upload-pane hidden">
      <form class="article-form" id="articleForm" onsubmit="return false">
        <div class="field-row-inline">
          <div class="field-row">
            <label class="field-label">Book</label>
            <select class="field-input" id="addBookSelect" onchange="currentBookId=this.value;renderBookSelect()"></select>
          </div>
          <div class="field-row">
            <label class="field-label">Article Number</label>
            <input class="field-input" id="addNumber" type="number" min="1" placeholder="1">
          </div>
        </div>
        <div class="field-row">
          <label class="field-label">Chapter</label>
          <input class="field-input" id="addChapter" placeholder='e.g. "Chapter 1 — Effect and Application of Laws"'>
        </div>
        <div class="field-row">
          <label class="field-label">Title</label>
          <input class="field-input" id="addTitle" placeholder='e.g. "Article 1"'>
        </div>
        <div class="field-row">
          <label class="field-label">Content (Markdown)</label>
          <textarea class="field-textarea" id="addContent" placeholder="Full article text..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="clearForm()">Clear</button>
          <button type="button" class="btn-primary" id="addArticleBtn" onclick="submitArticle()">Add Article</button>
        </div>
      </form>
      <div id="uploadAddResult" class="upload-result" style="display:none"></div>
    </div>
    <div id="uploadPaneManage" class="upload-pane hidden">
      <div class="mgr-section" style="margin-bottom:16px;">
        <div class="mgr-header" style="margin-bottom:8px;">
          <span style="font-weight:700;font-size:13px;">Books</span>
        </div>
        <div id="mgrBookList" style="max-height:150px;overflow-y:auto;"></div>
      </div>
      <div class="mgr-section">
        <div class="mgr-header">
          <span class="mgr-count" id="mgrCount">Loading articles…</span>
          <button class="btn-sm" onclick="loadManageArticles()">↻ Refresh</button>
        </div>
        <div class="mgr-list" id="mgrList"></div>
      </div>
      <div id="uploadMgrResult" class="upload-result" style="display:none"></div>
    </div>
    <div id="uploadPaneGenerate" class="upload-pane hidden">
      <div class="upload-book-row">
        <label class="field-label" style="margin-bottom:0;">Upload to book:</label>
        <select class="upload-book-select" id="genBookSelect" onchange="currentBookId=this.value;renderBookSelect();updateGenStartNum()"></select>
        <button class="btn-sm" onclick="createBookFromUpload()">+ New</button>
      </div>
      <textarea class="field-textarea" id="genInput" style="min-height:160px;" placeholder="Paste statute/constitution text here..."></textarea>
      <div style="display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;align-items:center;">
        <label style="font-size:12px;color:var(--text-dim);">Start # <input class="field-input" id="genStartNum" type="number" min="1" value="1" style="width:60px;"></label>
        <label style="font-size:12px;color:var(--text-dim);">Chapter <input class="field-input" id="genChapter" value="Ch. 1" style="width:80px;"></label>
        <button class="btn-primary" onclick="generateArticles()">Parse</button>
        <button class="btn-sm" onclick="document.getElementById('genInput').value='';document.getElementById('genPreview').style.display='none';document.getElementById('genUploadBtn').disabled=true;document.getElementById('genDownloadBtn').disabled=true">Clear</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin:6px 0;font-size:12px;color:var(--text-dim);align-items:center;">
        <label><input type="checkbox" id="genFixOcr" checked> Fix OCR</label>
        <label><input type="checkbox" id="genJoinBreaks" checked> Rejoin</label>
        <label><input type="checkbox" id="genStripNoise" checked> Strip noise</label>
        <label><input type="checkbox" id="genDedupe" checked> Dedupe</label>
        <label>Custom markers: <input class="field-input" id="genNoisePatterns" oninput="saveGenPatterns()" placeholder="Gong gong:, [Speaker]" style="width:180px;font-size:11px;"></label>
      </div>
      <div class="upload-preview" id="genPreview" style="display:none">
        <table><thead><tr><th>#</th><th>Art.</th><th>Title</th><th>Chapter</th></tr></thead>
        <tbody id="genPreviewBody"></tbody></table>
      </div>
      <div id="genResult" class="upload-result" style="display:none"></div>
      <div style="margin-top:8px;display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn-primary" id="genUploadBtn" onclick="uploadGeneratedArticles()" disabled>Upload to Book</button>
        <button class="btn-sm" id="genDownloadBtn" onclick="downloadGeneratedCsv()" disabled>Download CSV</button>
      </div>
    </div>
  </div>
  <div class="upload-footer">
    <button class="btn-cancel" onclick="document.getElementById('uploadModal').classList.add('hidden')">Close</button>
  </div>
</div>
</div>

<script>
let supabaseClient = null
let authToken = null
let books = []
let currentBookId = null
let articles = []
let parsedArticles = []
let editingArticleId = null
let generatedArticles = []

// ─── Auth helpers ────────────────────────────
async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' }
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken
  const res = await fetch(path, { ...options, cache: 'no-cache', headers: { ...headers, ...options.headers } })
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }))
    throw new Error(err.error || 'API error')
  }
  return res.json()
}

function escapeHtml(str) {
  const div = document.createElement('div')
  div.textContent = str
  return div.innerHTML
}

// ─── Init ────────────────────────────────────
async function init() {
  try {
    const config = await api('/api/config')
    supabaseClient = supabase.createClient(config.supabaseUrl, config.supabaseAnonKey, {
      auth: { persistSession: false },
    })
    // Try restoring session from cookie
    let session = null
    try { const r = await supabaseClient.auth.getSession(); session = r.data.session } catch(e) {}
    if (!session) {
      const token = document.cookie.match(/(?:^|;\s*)lex_token=([^;]*)/)
      if (token) {
        try { await supabaseClient.auth.setSession({ access_token: token[1], refresh_token: '' }); session = (await supabaseClient.auth.getSession()).data.session } catch(e) {}
      }
    }
    if (session) {
      authToken = session.access_token
      const adminAuthed = localStorage.getItem('csv_admin') === '1'
      if (adminAuthed) {
        showManager()
      } else {
        document.getElementById('supaOverlay').classList.add('hidden')
        document.getElementById('adminOverlay').classList.remove('hidden')
        const cookiePass = (document.cookie.match(/(?:^|;\s*)admin_pass=([^;]*)/)||[])[1]
        const savedPass = cookiePass ? decodeURIComponent(cookiePass) : localStorage.getItem('saved_admin_pass')
        if (savedPass) { document.getElementById('adminPass').value = savedPass; adminLogin() }
        else document.getElementById('adminPass').focus()
      }
    } else {
      document.getElementById('supaOverlay').classList.remove('hidden')
      document.getElementById('loginEmail').focus()
    }
  } catch (e) {
    console.error('Init error:', e)
  }
}
init()

// ─── Supabase Auth ──────────────────────────
async function supaLogin() {
  const email = document.getElementById('loginEmail').value.trim()
  const password = document.getElementById('loginPass').value
  const btn = document.getElementById('loginBtn')
  const errorEl = document.getElementById('loginError')

  if (!supabaseClient) { errorEl.textContent = 'Still loading…'; return }
  if (!email || !password) { errorEl.textContent = 'Please enter email and password.'; return }

  btn.disabled = true; btn.textContent = 'Signing in…'; errorEl.textContent = ''
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password })
    if (error) throw error
    authToken = data.session.access_token
    try { document.cookie = 'lex_token=' + authToken + '; path=/; max-age=604800; SameSite=Lax' } catch(e) {}
    document.getElementById('supaOverlay').classList.add('hidden')
    document.getElementById('adminOverlay').classList.remove('hidden')
    document.getElementById('adminPass').focus()
  } catch (e) {
    errorEl.textContent = e.message || 'Sign in failed.'
  }
  btn.disabled = false; btn.textContent = 'Sign In'
}

// ─── Admin Auth ──────────────────────────────
function saveAdminPass() {
  const v = document.getElementById('adminPass').value
  localStorage.setItem('saved_admin_pass', v)
  document.cookie = 'admin_pass=' + encodeURIComponent(v) + '; path=/; max-age=31536000; SameSite=Lax'
}

function saveGenPatterns() {
  document.cookie = 'gen_noise_patterns=' + encodeURIComponent(document.getElementById('genNoisePatterns').value) + '; path=/; max-age=31536000; SameSite=Lax'
}

async function adminLogin() {
  const pass = document.getElementById('adminPass').value
  const btn = document.getElementById('adminLoginBtn')

function handleFile(input) {
  const file = input.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = function(e) { parseCSV(e.target.result) }
  reader.readAsText(file)
  input.value = ''
}

function handleDragOver(e) { e.preventDefault(); e.stopPropagation(); document.getElementById('dropZone').classList.add('dragover') }
function handleDragLeave(e) { e.preventDefault(); e.stopPropagation(); document.getElementById('dropZone').classList.remove('dragover') }

function handleDrop(e) {
  e.preventDefault(); e.stopPropagation()
  document.getElementById('dropZone').classList.remove('dragover')
  const files = e.dataTransfer.files
  if (files.length > 0 && files[0].name.match(/\.(csv|txt)$/i)) {
    const reader = new FileReader()
    reader.onload = function(ev) { parseCSV(ev.target.result) }
    reader.readAsText(files[0])
  } else {
    showCsvResult('Please drop a .csv or .txt file.', false)
  }
}

function parseCSV(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n')
  const rows = []
  let i = 0, isFirstRow = true, header = null, colMap = {}
  while (i < text.length) {
    if (text[i] === '\n') { i++; continue }
    const cells = []
    while (i < text.length && text[i] !== '\n') {
      let cell = ''
      if (text[i] === '"') {
        i++
        while (i < text.length) {
          if (text[i] === '"') {
            if (i + 1 < text.length && text[i + 1] === '"') { cell += '"'; i += 2 }
            else { i++; break }
          } else { cell += text[i++] }
        }
      } else {
        while (i < text.length && text[i] !== ',' && text[i] !== '\n') { cell += text[i++] }
      }
      cells.push(cell.trim())
      if (i < text.length && text[i] === ',') i++
    }
    if (i < text.length && text[i] === '\n') i++
    if (cells.every(c => c === '')) continue
    if (isFirstRow) {
      isFirstRow = false; header = cells
      header.forEach((h, idx) => colMap[h.toLowerCase().trim()] = idx)
      const required = ['chapter', 'article_number', 'title', 'content_md']
      const missing = required.filter(r => !(r in colMap))
      if (missing.length > 0) { showCsvResult('Missing columns: ' + missing.join(', ') + '. Required: ' + required.join(', '), false); return }
      continue
    }
    const get = (col) => (cells[colMap[col]] || '').trim().replace(/\\n/g, '\n')
    const artNum = parseInt(get('article_number'), 10)
    rows.push({ chapter: get('chapter'), article_number: isNaN(artNum) ? 0 : artNum, title: get('title'), content_md: get('content_md') })
  }
  if (rows.length === 0) { showCsvResult('CSV must have a header row and at least one data row.', false); return }
  parsedArticles = rows
  renderPreview(rows)
}

function renderPreview(rows) {
  const valid = rows.filter(r => r.article_number > 0 && r.title && r.content_md)
  const tbody = document.getElementById('previewBody')
  tbody.innerHTML = valid.slice(0, 50).map((r, i) =>
    `<tr><td class="num">${i + 1}</td><td class="num">${r.article_number}</td><td>${escapeHtml(r.title)}</td><td>${escapeHtml(r.chapter)}</td></tr>`
  ).join('')
  if (valid.length > 50) tbody.innerHTML += `<tr><td colspan="4" style="color:var(--text-muted);font-style:italic">… and ${rows.length - 50} more</td></tr>`
  document.getElementById('uploadPreview').style.display = 'block'
  document.getElementById('confirmUploadBtn').disabled = valid.length === 0
}

function showCsvResult(msg, ok) {
  const el = document.getElementById('uploadCsvResult')
  el.textContent = msg; el.className = 'upload-result ' + (ok ? 'ok' : 'err'); el.style.display = 'block'
}

  if (valid.length === 0) return
  if (!currentBookId) { showCsvResult('No book selected.', false); return }
  const btn = document.getElementById('confirmUploadBtn')
  btn.disabled = true; btn.textContent = 'Uploading…'
  try {
    const result = await api('/api/articles/upload', { method: 'POST', body: JSON.stringify({ bookId: currentBookId, articles: valid }) })
    const msg = result.inserted + ' article(s) uploaded successfully.'
    if (result.errors && result.errors.length > 0) showCsvResult(msg + ' ' + result.errors.length + ' error(s): ' + result.errors.map(e => e.reason).join('; '), true)
    else showCsvResult(msg, true)
    await reloadArticles(currentBookId)
    loadManageArticles()
  } catch (e) { showCsvResult('Upload failed: ' + e.message, false) }
  btn.disabled = false; btn.textContent = 'Upload CSV'

const ROMAN_MAP = {i:1,ii:2,iii:3,iv:4,v:5,vi:6,vii:7,viii:8,ix:9,x:10,xi:11,xii:12,xiii:13,xiv:14,xv:15,xvi:16,xvii:17,xviii:18,xix:19,xx:20}
function romanToInt(r){ r = r.toLowerCase(); if (ROMAN_MAP[r] !== undefined) return ROMAN_MAP[r]; const n = parseInt(r,10); return isNaN(n) ? r : n }

function fixOcrErrors(text){
  const fixes = [
    [/\barchipelag\b/g,'archipelago'],
    [/\bpers person\b/gi,'person'],
    [/\bar civil\b/g,'or civil'],
    [/\bouth\b/g,'youth'],
    [/\bheir\b(?=\s+physical)/g,'their'],
    [/\bpar of\b/g,'part of'],
    [/\bembrace therein\b/g,'embraced therein'],
    [/[ \t]{2,}/g,' '],
    [/ ,/g,','],
    [/ \./g,'.'],
    [/[“”]/g,'"'],
    [/[‘’]/g,"'"],
  ]
  let out = text
  for (const [pat, rep] of fixes) out = out.replace(pat, rep)
  return out
}

function safeRejoin(raw){
  const lines = raw.split(/\r?\n/)
  const out = []
  const startsNewUnit = (l) => /^(article|section|sec\.|chapter|\(\d+\)|\(\w\)|\d+\.\s)/i.test(l.trim())
  for (let i = 0; i < lines.length; i++){
    let line = lines[i].trim()
    if (line === '') { out.push(''); continue }
    while (
      out.length && out[out.length-1] !== '' &&
      !/[.!?:]["')\]]?$/.test(out[out.length-1]) &&
      !startsNewUnit(line) &&
      /^[a-z(]/.test(line)
    ){
      out[out.length-1] = out[out.length-1] + ' ' + line
      i++
      if (i >= lines.length) break
      line = lines[i].trim()
      if (line === '') break
    }
    if (i < lines.length) out.push(line)
  }
  return out.join('\n')
}

function stripNoiseMarkers(t, extras){
  let out = t.replace(/^\s*>?\s*[A-Za-z][A-Za-z ]{0,24}:\s*/gm,'').replace(/>\s*[A-Za-z][A-Za-z ]{0,24}:\s*/g,' ')
  if(extras&&extras.length) for(const p of extras){ const e=p.trim(); if(e) out=out.replace(new RegExp('>?\\s*'+e.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*','gi'),' ') }
  return out.replace(/[ \t]{2,}/g,' ').replace(/\n{3,}/g,'\n\n')
}

function dedupeRepeatedBlocks(text, minW, maxGap){
  minW=minW||18; maxGap=maxGap||400
  const words = text.split(/(\s+)/), tok = []; words.forEach((w,i)=>{if(!/^\s*$/.test(w))tok.push(i)})
  const norm = w=>w.toLowerCase().replace(/[^\w']/g,''), seen = new Map(), drop = new Set()
  for(let t=0;t+minW<=tok.length;t++){
    if(drop.has(tok[t])) continue
    const key = Array.from({length:minW},(_,k)=>norm(words[tok[t+k]])).join(' ')
    if(!key.trim()) continue
    if(seen.has(key)&&(t-seen.get(key))<=maxGap){
      let extra=0; while(t+minW+extra<tok.length&&seen.get(key)+minW+extra<tok.length&&norm(words[tok[t+minW+extra]])===norm(words[tok[seen.get(key)+minW+extra]])) extra++
      for(let k=0;k<minW+extra;k++) drop.add(tok[t+k]); t+=minW+extra-1; continue
    }
    seen.set(key,t)
  }
  let out=''; for(let i=0;i<words.length;i++){if(!drop.has(i))out+=words[i]}
  return out.replace(/[ \t]+\n/g,'\n').replace(/\n[ \t]+/g,'\n').replace(/[ \t]{2,}/g,' ').replace(/\n{3,}/g,'\n\n').trim()
}

function parseArticles(text, chapterLabel, doFixOcr, doJoin, doStripNoise, extraPatterns, doDedupe){
  let src = text.replace(/\r\n/g,'\n')
  if (doStripNoise) src = stripNoiseMarkers(src, extraPatterns)
  if (doJoin) src = safeRejoin(src)
  if (doDedupe) src = dedupeRepeatedBlocks(src)
  if (doFixOcr) src = fixOcrErrors(src)
  const lines = src.split('\n'), markers = [], regex = /^(ARTICLE|Article)\s+([IVXLCDM]+|\d+)\b\.?\s*(.*)$/
  for (let i=0;i<lines.length;i++){ const m=lines[i].trim().match(regex); if(m) markers.push({idx:i,roman:m[2],inlineTitle:m[3].trim()}) }
  if (!markers.length) return { articles:[], warning:'No "Article" headings found. Check the text starts each section with the word ARTICLE.' }
  const articles = []
  for (let a=0;a<markers.length;a++){
    const start=markers[a].idx, end=a+1<markers.length?markers[a+1].idx:lines.length
    let bodyLines=lines.slice(start+1,end)
    // Prefer inline title on the ARTICLE line itself (after a dash or --)
    let title=markers[a].inlineTitle.replace(/^[-–—:]\s*/,'').trim()
    // If no inline title, look at next non-empty line before first body text
    if(!title){
      let i=0; while(i<bodyLines.length&&!bodyLines[i].trim()) i++
      if(i<bodyLines.length){
        const candidate=bodyLines[i].trim()
        const looksLikeSection=/^(section|sec\.)\s/i.test(candidate)
        const looksLikeBody=candidate.length>70||(/[.]$/.test(candidate)&&candidate.split(' ').length>10)
        if(!looksLikeSection&&!looksLikeBody&&candidate.length<80){ title=candidate.replace(/[.:]$/,''); bodyLines=bodyLines.slice(i+1) }
      }
    }
    const articleNum = romanToInt(markers[a].roman)
    const fullTitle = `Article ${markers[a].roman}${title?' - '+title:''}`
    let body = bodyLines.join('\n').trim()
    body = body.replace(/\n{2,}/g,'\n')
    articles.push({ chapter:chapterLabel, article_number:articleNum, title:fullTitle, content_md:body })
  }
  return { articles, warning:null }
}

function articlesToCsv(articles){
  const esc = v => '"' + String(v).replace(/\r?\n/g,' | ').replace(/"/g,'""').trim() + '"'
  return ['chapter,article_number,title,content_md', ...articles.map(a=>[esc(a.chapter),a.article_number,esc(a.title),esc(a.content_md)].join(','))].join('\n')
}

function generateArticles(){
  const text = document.getElementById('genInput').value
  const ch = document.getElementById('genChapter').value || 'Ch. 1'
  const startOffset = (parseInt(document.getElementById('genStartNum').value,10) || 1) - 1
  const doFixOcr = document.getElementById('genFixOcr').checked
  const doJoin = document.getElementById('genJoinBreaks').checked
  const doStripNoise = document.getElementById('genStripNoise').checked
  const doDedupe = document.getElementById('genDedupe').checked
  const extraPatterns = document.getElementById('genNoisePatterns').value.split(',').filter(Boolean)
  if (!text.trim()){ document.getElementById('genResult').textContent='Paste some text first.'; document.getElementById('genResult').className='upload-result err'; document.getElementById('genResult').style.display='block'; return }
  const {articles,warning} = parseArticles(text, ch, doFixOcr, doJoin, doStripNoise, extraPatterns, doDedupe)
  if(!articles.length){ document.getElementById('genResult').textContent=warning||'No articles found.'; document.getElementById('genResult').className='upload-result err'; document.getElementById('genResult').style.display='block'; return }
  // Apply start offset to parsed roman numeral article numbers (e.g. start=5 shifts Article I → 5)
  if (startOffset !== 0) articles.forEach(a => { if (typeof a.article_number === 'number') a.article_number += startOffset })
  generatedArticles = articles
  const tbody=document.getElementById('genPreviewBody'), max=50
  tbody.innerHTML=articles.slice(0,max).map((r,i)=>`<tr><td class="num">${i+1}</td><td class="num">${r.article_number}</td><td>${escapeHtml(r.title)}</td><td>${escapeHtml(r.chapter)}</td></tr>`).join('')
  if(articles.length>max) tbody.innerHTML+=`<tr><td colspan="4" style="color:var(--text-muted);font-style:italic">… and ${articles.length-max} more</td></tr>`
  document.getElementById('genPreview').style.display='block'
  document.getElementById('genUploadBtn').disabled=false; document.getElementById('genDownloadBtn').disabled=false
  document.getElementById('genResult').textContent=`Parsed ${articles.length} article(s).`; document.getElementById('genResult').className='upload-result ok'; document.getElementById('genResult').style.display='block'
}

function downloadGeneratedCsv(){
  if(!generatedArticles.length) return
  const blob=new Blob([articlesToCsv(generatedArticles)],{type:'text/csv;charset=utf-8;'}), url=URL.createObjectURL(blob)
  const a=document.createElement('a'); a.href=url; a.download='generated_articles.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url)
}

async function uploadGeneratedArticles(){
  if(!generatedArticles.length) return
  if(!currentBookId){ document.getElementById('genResult').textContent='No book selected.'; document.getElementById('genResult').className='upload-result err'; document.getElementById('genResult').style.display='block'; return }
  const btn=document.getElementById('genUploadBtn'); btn.disabled=true; btn.textContent='Uploading…'
  try{
    const r=await api('/api/articles/upload',{method:'POST',body:JSON.stringify({bookId:currentBookId,articles:generatedArticles})})
    document.getElementById('genResult').textContent=r.inserted+' article(s) uploaded.'+(r.errors?.length?' '+r.errors.length+' error(s).':'')+(r.dupesStripped?' ('+r.dupesStripped+' dupes stripped)':'')
    document.getElementById('genResult').className='upload-result ok'; document.getElementById('genResult').style.display='block'; loadManageArticles()
  }catch(e){ document.getElementById('genResult').textContent='Upload failed: '+e.message; document.getElementById('genResult').className='upload-result err'; document.getElementById('genResult').style.display='block' }
  btn.disabled=false; btn.textContent='Upload to Book'
}
</script>
</body>
</html>
